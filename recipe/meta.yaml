{% set name = "pygeohash" %}
{% set version = "2.1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 3edb3a0c9df95435fd9b2ba9a7ef3ce42febcedb8f71b50899df3246fc32e8bc

build:
  noarch: python
  number: 0
  script: "{{ PYTHON }} -m pip install . --no-deps -vv"

requirements:
  host:
    - python
    - pip
  run:
    - python

test:
  imports:
    - pygeohash

about:
  home: https://github.com/wdm0006/pygeohash
  license: AGPL-3.0
  license_family: AGPL
  license_file: LICENSE.txt
  summary: 'A module for decoding and encoding geohashes to and from latitude and longitude coordinates'

  description: |
    Pygeohash is a Python module that provides functions for
    decoding and encoding geohashes to and from latitude and
    longitude coordinates, and doing basic calculations and
    approximations with them.


extra:
  recipe-maintainers:
    - mxr-conda
    - rluria14
    - adbeda
    - agcopenhaver
    - oblute
